# Screen benchmark (LABELS) ---------------------------------------------------
#
# A small, hand-labeled "answer key" used to judge whether the screen is doing
# its job. The evaluation harness (evaluate_screen.py) checks the live database
# against these two lists and reports any violations.
#
#   must_pass:    filers that SHOULD be shown — genuine concentrated value
#                 managers. If any of these is hidden, the screen is too tight.
#   must_exclude: filers that should NOT be shown — operating/holding companies
#                 reporting one strategic stake, broad mutual-fund/advisor
#                 complexes, market-makers. If any is shown, the screen is too loose.
#
# Each entry is {cik, name, reason}. CIK is the numeric SEC id (leading zeros
# don't matter). Names are for humans; matching is by CIK.
#
# Editing rules for the auto-iteration loop: you may ADD well-justified entries,
# but never DELETE one just to make the screen pass — that defeats the purpose.

